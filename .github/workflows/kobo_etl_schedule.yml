name: Automated Kobo to Supabase ETL

on:
  schedule:
    # This CRON schedule triggers the script automatically every 30 minutes. 
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # This line is highly important: it gives you a manual "Run" button to test it instantly!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download code from repo to runner
    - name: Check out repo code
      uses: actions/checkout@v4

    # Step 2: Provision a clean Python ecosystem environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # Step 3: Install all needed data cleaning modules
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Securely inject secrets and execute script
    - name: Run ETL Pipeline Script
      env:
        KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
        SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
      run: python survey_collection.py
