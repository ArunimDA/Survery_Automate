name: Automated Kobo to Supabase ETL

on:
  repository_dispatch:
    types: [kobo_submission_event]   # This listens for the exact event trigger sent from Kobo
  workflow_dispatch:                  # Keeps your manual test play button active too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ETL Pipeline Script
      env:
        KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
        FORM_ASSET_ID: ${{ secrets.FORM_ASSET_ID }}
        SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
        SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
        SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
        SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
        SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
        SUPABASE_TABLE_NAME: ${{ secrets.SUPABASE_TABLE_NAME }}
      run: python survey_collection.py
